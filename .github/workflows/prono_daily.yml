name: "🎯 Prono du jour + grille (cloud gratuit)"
# Orchestrateur public. Le code + les données vivent dans fc-pronox (privé),
# checkout via FCPRONOX_PAT, l'état est recommitté dans fc-pronox.
# Snapshot matches via scénario admin READ-ONLY (0 appel api-football).

on:
  schedule:
    - cron: "45 8 * * *"   # 10h45 Paris (été)
  workflow_dispatch:
    inputs:
      competition:
        description: "Championnat (défaut WC)"
        type: string
        default: "WC"

permissions:
  contents: read

concurrency:
  group: prono-daily
  cancel-in-progress: false

jobs:
  prono:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fc-pronox (privé)
        uses: actions/checkout@v4
        with:
          repository: MehdiBou7a/fc-pronox
          token: ${{ secrets.FCPRONOX_PAT }}
          ref: main
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Snapshot matches (scénario admin read-only)
        env:
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN }}
        run: |
          COMP="${{ github.event.inputs.competition }}"; COMP="${COMP:-WC}"
          mkdir -p marketing/tools/.api_cache
          URL="https://europe-west9-fc-pronox.cloudfunctions.net/syncTrigger?scenario=export-matches-snapshot&competition=${COMP}"
          curl -sS -f -H "x-admin-token: ${ADMIN_SYNC_TOKEN}" "$URL" -o /tmp/resp.json
          jq -e '.result.matches | type == "array"' /tmp/resp.json > /dev/null
          jq -c '.result.matches' /tmp/resp.json > marketing/tools/.api_cache/wc_matches_snapshot.json
          echo "Snapshot: $(jq '.result.count' /tmp/resp.json) matchs ($COMP)."

      - name: Générer la carte + la grille
        run: python _PILOTAGE/tools/prono_du_jour.py --no-push --cloud-snapshot

      - name: Committer carte + grille + bilan (si changements)
        run: |
          git config user.name "PronoGo Cloud Prono"
          git config user.email "pronogo.dev@gmail.com"
          git add marketing/reports/routines/posts/ \
                  marketing/reports/routines/grille/ \
                  marketing/reports/routines/pronos/track_record.json \
                  marketing/tools/.api_cache/wc_matches_snapshot.json \
                  _PILOTAGE/sync_log.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Rien à committer (carte du jour déjà présente → anti-doublon)."; exit 0
          fi
          git commit -m "report(prono-du-jour) $(date -u +%Y-%m-%d) [cloud]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "Push OK (essai $i)."; exit 0; fi
            echo "Push refusé (essai $i) → pull --rebase puis retry..."
            git pull --rebase origin main; sleep $((i * 3))
          done
          echo "Push échoué après 5 essais — le prochain run rattrapera."
