name: "📋 Menu de validation du jour (cloud gratuit)"
# Écrit approval_menus/{date} (lu par la mini-page de validation) + héberge les
# vignettes. 100% mécanique, idempotent (set sans merge → rejouable).
# Déclenché sur horaire (après les producteurs de posts) au lieu du push posts/**
# (le repo public ne peut pas observer les push du repo privé fc-pronox).

on:
  # PRIMAIRE : déclenché par la routine « Le Post du Jour » (Solution C) via
  # `gh workflow run` dès qu'elle a fini → le menu se construit pile quand le
  # contenu est prêt. Les crons ci-dessous sont un FILET DE SECOURS (idempotent)
  # au cas où le déclenchement par la routine échoue (ou soir calme sans post).
  schedule:
    - cron: "30 9 * * *"    # 11h30 Paris — secours matin (après grille 11h + post)
    - cron: "30 21 * * *"   # 23h30 Paris — secours soir (après grille-bilan 23h)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Aperçu seulement (--dry) : construit le menu SANS héberger ni écrire"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-menu
  cancel-in-progress: false

jobs:
  build-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fc-pronox (privé)
        uses: actions/checkout@v4
        with:
          repository: MehdiBou7a/fc-pronox
          token: ${{ secrets.FCPRONOX_PAT }}
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node (pour firebase-tools)
        if: github.event.inputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer firebase-tools
        if: github.event.inputs.dry_run != 'true'
        run: npm install -g firebase-tools

      - name: Construire + écrire le menu
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="--dry"; fi
          python -X utf8 marketing/tools/build_approval_menu.py $ARGS

      # BOUCLAGE : ramène les retours du fondateur (décisions + « pourquoi ») dans
      # FEEDBACK_LOG.json → les routines de contenu liront `feedback.py digest`.
      - name: Collecte des retours du fondateur (bouclage)
        if: github.event.inputs.dry_run != 'true'
        env:
          APPROVAL_LINK_TOKEN: ${{ secrets.APPROVAL_LINK_TOKEN }}
          SUBMIT_APPROVAL_URL: ${{ secrets.APPROVAL_API_URL }}
        run: python -X utf8 marketing/tools/feedback.py collect --days 10 || echo "collect feedback non bloquant"

      # Assemble le dossier du jour marketing/JOUR/{date}/ (tout le contenu réuni,
      # images copiées + format naturel) et le committe dans fc-pronox. Non
      # destructif + idempotent → un re-run (secours) complète le dossier.
      - name: Assembler le dossier du jour (JOUR/) + commit fc-pronox
        if: github.event.inputs.dry_run != 'true'
        run: |
          DATE=$(TZ=Europe/Paris date +%Y-%m-%d)
          python -X utf8 marketing/tools/build_jour.py --date "$DATE" || { echo "build_jour a échoué (non bloquant)"; exit 0; }
          git config user.name "PronoGo Cloud Jour"
          git config user.email "pronogo.dev@gmail.com"
          git add marketing/JOUR/ marketing/content_machine/FEEDBACK_LOG.json 2>/dev/null || true
          if git diff --cached --quiet; then echo "JOUR/feedback inchangés."; exit 0; fi
          git commit -m "assemble(jour) + feedback $DATE [skip ci]"
          for i in 1 2 3; do
            if git push origin HEAD:main; then echo "Push JOUR OK."; exit 0; fi
            git pull --rebase origin main; sleep $((i * 3))
          done
          echo "Push JOUR échoué — le prochain run (secours) rattrapera."
