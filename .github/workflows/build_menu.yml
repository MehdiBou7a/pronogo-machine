name: "📋 Menu de validation du jour (cloud gratuit)"
# Écrit approval_menus/{date} (lu par la mini-page de validation) + héberge les
# vignettes. 100% mécanique, idempotent (set sans merge → rejouable).
# Déclenché sur horaire (après les producteurs de posts) au lieu du push posts/**
# (le repo public ne peut pas observer les push du repo privé fc-pronox).

on:
  schedule:
    - cron: "0 9 * * *"   # ~11h Paris (été), après « Le Post du Jour » (7h) et le prono (10h45)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Aperçu seulement (--dry) : construit le menu SANS héberger ni écrire"
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: build-menu
  cancel-in-progress: false

jobs:
  build-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fc-pronox (privé)
        uses: actions/checkout@v4
        with:
          repository: MehdiBou7a/fc-pronox
          token: ${{ secrets.FCPRONOX_PAT }}
          ref: main
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node (pour firebase-tools)
        if: github.event.inputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer firebase-tools
        if: github.event.inputs.dry_run != 'true'
        run: npm install -g firebase-tools

      - name: Construire + écrire le menu
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="--dry"; fi
          python -X utf8 marketing/tools/build_approval_menu.py $ARGS
