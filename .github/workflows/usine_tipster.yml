name: "🏭 Usine de contenu (actu + memes + produit + tipster) — cloud gratuit"
# Usine COMPLÈTE offline (0 jeton). Le code + les données vivent dans fc-pronox
# (privé), checkout via FCPRONOX_PAT, l'état est recommitté dans fc-pronox.
# Chaîne : actu 4 phases (récolte→comprend→consolide→sélectionne) → flop → memes →
# produit → tipster (grille + Goalardo). Chaque producteur émet une carte posts/
# → mail + validation + publi FB/IG. Snapshot matchs via scénario admin read-only.

on:
  schedule:
    - cron: "0 9 * * *"    # 11h Paris (été) — usine du MATIN
    - cron: "0 21 * * *"   # 23h Paris (été) — usine du SOIR
  workflow_dispatch:
    inputs:
      competitions:
        description: "Compétitions (liste virgules)"
        type: string
        default: "WC,CL,EL,ECL,FL1,PL,PD,BL1,SA"

permissions:
  contents: read

concurrency:
  group: usine-contenu
  cancel-in-progress: false

jobs:
  usine:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout fc-pronox (privé)
        uses: actions/checkout@v4
        with:
          repository: MehdiBou7a/fc-pronox
          token: ${{ secrets.FCPRONOX_PAT }}
          ref: main
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dépendances (rendu + réseau + montage photo réelle)
        # opencv+onnxruntime = détection visage (yunet) + détourage u2netp (modèles
        # BUNDLÉS dans fc-pronox, zéro téléchargement). rembg = détourage premium
        # isnet (télécharge son modèle au 1er usage ; si échec → fallback u2netp).
        run: pip install --quiet Pillow requests feedparser opencv-python-headless onnxruntime numpy rembg

      - name: Snapshot matchs multi-compétitions (scénario admin read-only)
        env:
          ADMIN_SYNC_TOKEN: ${{ secrets.ADMIN_SYNC_TOKEN }}
        run: |
          COMPS="${{ github.event.inputs.competitions }}"; COMPS="${COMPS:-WC,CL,EL,ECL,FL1,PL,PD,BL1,SA}"
          mkdir -p marketing/tools/.api_cache
          echo '[]' > snap.json
          IFS=',' read -ra LIST <<< "$COMPS"
          for COMP in "${LIST[@]}"; do
            URL="https://europe-west9-fc-pronox.cloudfunctions.net/syncTrigger?scenario=export-matches-snapshot&competition=${COMP}"
            if curl -sS -f -H "x-admin-token: ${ADMIN_SYNC_TOKEN}" "$URL" -o /tmp/resp.json \
               && jq -e '.result.matches | type == "array"' /tmp/resp.json > /dev/null; then
              jq -s '.[0] + .[1]' snap.json <(jq '.result.matches' /tmp/resp.json) > merged.json && mv merged.json snap.json
            fi
          done
          mv snap.json marketing/tools/.api_cache/wc_matches_snapshot.json
          echo "Snapshot: $(jq 'length' marketing/tools/.api_cache/wc_matches_snapshot.json) matchs."

      - name: Lancer l'usine (récap ✅/❌ par script, non bloquant mais VISIBLE)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PYTHONUNBUFFERED: "1"   # logs en DIRECT (pas de buffer perdu si un script traîne/est tué)
        run: |
          fail=0
          for S in \
            marketing/tools/rss_ingest.py \
            marketing/tools/comprehend.py \
            marketing/tools/consolidate.py \
            marketing/tools/select_edito.py \
            marketing/tools/actu_run.py \
            marketing/tools/flop_run.py \
            marketing/tools/meme_run.py \
            marketing/tools/produit_run.py \
            marketing/tools/montage_run.py \
            marketing/tools/injury_detect.py \
            marketing/tools/grille_jour.py \
            marketing/tools/goalardo_candidates.py \
            marketing/tools/journal_tipster.py ; do
            echo "──────── $S ────────"
            if python -X utf8 "$S"; then echo "✅ OK  $S"; else echo "❌ ÉCHEC  $S (code $?)"; fail=1; fi
          done
          echo "════════ RÉCAP USINE ════════"
          [ "$fail" = "1" ] && echo "::warning::au moins un script a échoué (voir ci-dessus)" || echo "Tous les scripts OK."

      - name: Committer les cartes + sorties (si changements)
        run: |
          git config user.name "PronoGo Cloud Usine"
          git config user.email "pronogo.dev@gmail.com"
          git add marketing/reports/routines/posts/ \
                  marketing/reports/routines/grille_jour/ \
                  marketing/reports/routines/bilan/ \
                  marketing/content_machine/a_valider/ \
                  marketing/content_machine/*.json \
                  marketing/content_machine/GOALARDO_RDV.json \
                  marketing/photo_staging/ \
                  _PILOTAGE/tipster/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Rien à committer (usine du jour déjà présente)."; exit 0
          fi
          git commit -m "usine(contenu) $(date -u +%Y-%m-%d) [cloud]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "Push OK (essai $i)."; exit 0; fi
            git pull --rebase origin main; sleep $((i * 3))
          done
          echo "Push échoué après 5 essais — le prochain run rattrapera."
