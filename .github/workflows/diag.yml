name: diag
# TEMPORAIRE — diagnostic d'intégrité des secrets Meta (à supprimer après).
# N'affiche AUCUN secret : uniquement longueurs + sha256 (irréversible) +
# messages d'erreur Meta filtrés (jamais un token en clair).
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Intégrité + test Meta
        env:
          T: ${{ secrets.META_LONG_LIVED_TOKEN }}
          A: ${{ secrets.META_APP_ID }}
          S: ${{ secrets.META_APP_SECRET }}
        run: |
          echo "TOKEN  len=${#T}  sha=$(printf '%s' "$T" | sha256sum | cut -c1-16)"
          echo "APPID  len=${#A}  sha=$(printf '%s' "$A" | sha256sum | cut -c1-16)"
          echo "SECRET len=${#S}  sha=$(printf '%s' "$S" | sha256sum | cut -c1-16)"
          echo "--- debug_token (filtré) ---"
          curl -sS "https://graph.facebook.com/v20.0/debug_token?input_token=${T}&access_token=${T}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin).get('data',{}); print('app_id=',d.get('app_id'),'valid=',d.get('is_valid'),'err=',d.get('error',{}).get('message'))" 2>/dev/null || echo "debug_token: réponse non-JSON"
          echo "--- exchange (filtré, jamais le token) ---"
          curl -sS "https://graph.facebook.com/v20.0/oauth/access_token?grant_type=fb_exchange_token&client_id=${A}&client_secret=${S}&fb_exchange_token=${T}" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('ERREUR:',d['error']['message']) if 'error' in d else print('OK: token obtenu (masqué)')" 2>/dev/null || echo "exchange: réponse non-JSON"
