name: "📤 Email des posts prêts (léger + lien de validation)"
# Déclenché APRÈS build_menu (menu écrit). Envoie un mail léger : lien de la page
# de validation pour IG/FB + pièces jointes pour X/TikTok.
# Re-câblage cloud-gratuit : sélection des posts par DATE du jour (plus par git
# diff de push) + garde-fou anti-doublon `.mailed_<date>` committé dans fc-pronox
# → sûr à rejouer sur horaire. Destinataire = secret ALERT_EMAIL (jamais en clair
# dans ce fichier public). Le PIN n'est JAMAIS envoyé (2e facteur).

on:
  workflow_run:
    workflows: ["📋 Menu de validation du jour (cloud gratuit)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      force:
        description: "Ré-envoyer même si déjà mailé aujourd'hui"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  mail:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout fc-pronox (privé)
        uses: actions/checkout@v4
        with:
          repository: MehdiBou7a/fc-pronox
          token: ${{ secrets.FCPRONOX_PAT }}
          ref: main
          fetch-depth: 1

      - name: Compter les posts du jour (+ anti-doublon)
        id: news
        run: |
          DATE=$(TZ=Europe/Paris date +%Y-%m-%d)
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          DIR="marketing/reports/routines/posts"
          MARKER="$DIR/.mailed_$DATE"
          FORCE="${{ github.event.inputs.force }}"

          if [ -f "$MARKER" ] && [ "$FORCE" != "true" ]; then
            echo "Déjà mailé le $DATE (marqueur présent) → skip."
            echo "should_send=0" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Mail = UN seul lien vers la page unifiée (IG/FB + X/TikTok + vidéo + grille).
          # Plus de pièces jointes : la page montre tout. On compte juste pour le sujet.
          COUNT=0
          for p in "$DIR/${DATE}"_*.html; do
            [ -f "$p" ] || continue
            case "$(basename "$p")" in .*) continue ;; esac
            COUNT=$((COUNT + 1))
          done

          if [ "$COUNT" = "0" ]; then
            echo "Aucun post daté du $DATE → rien à envoyer."
            echo "should_send=0" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "should_send=1"     >> "$GITHUB_OUTPUT"
          echo "total_count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Envoyer l'email léger (Brevo SMTP)
        if: steps.news.outputs.should_send == '1'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp-relay.brevo.com
          server_port: 587
          username: ${{ secrets.BREVO_SMTP_USER }}
          password: ${{ secrets.BREVO_SMTP_KEY }}
          subject: "📤 PronoGo — ${{ steps.news.outputs.total_count }} post(s) prêt(s) à valider"
          to: ${{ secrets.ALERT_EMAIL }}
          reply_to: pronogo.dev@gmail.com
          from: "PronoGo Machine <pronogo.dev@gmail.com>"
          body: |
            Salut Mehdi,

            La machine a préparé ${{ steps.news.outputs.total_count }} post(s) du jour.

            👉 TOUT est sur UNE page (Instagram/Facebook + X/TikTok + vidéo + grille) :
            https://pronogo-valider.web.app/?token=${{ secrets.APPROVAL_LINK_TOKEN }}

            • Instagram / Facebook : coche ✅ Publier / ⏸ Plus tard / ❌ Non + l'heure → la machine publie.
            • X / TikTok / vidéo : copie la légende (bouton sur la page) et publie à la main.
            • Écris un retour sous un post → la machine apprend de toi.

            Ton PIN reste dans ta tête — il n'est JAMAIS dans ce mail.

            — La machine PronoGo 🦅

      - name: Marquer comme mailé (anti-doublon, committé dans fc-pronox)
        if: steps.news.outputs.should_send == '1'
        run: |
          DATE="${{ steps.news.outputs.date }}"
          MARKER="marketing/reports/routines/posts/.mailed_$DATE"
          echo "mailed at $(date -u +%FT%TZ)" > "$MARKER"
          git config user.name "PronoGo Cloud Mailer"
          git config user.email "pronogo.dev@gmail.com"
          git add "$MARKER"
          git commit -m "state(mail) marqueur anti-doublon $DATE [skip ci]" || { echo "rien à committer"; exit 0; }
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            git pull --rebase origin main; sleep $((i * 3))
          done
          echo "Push marqueur échoué — au pire un 2e mail partira, sans gravité."
